name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PNPM_VERSION: '9.4.0'
  NODE_VERSION: '20'

jobs:
  # ------------------------------------------------------------------
  # Job 1 — Type-check all workspaces via Turborepo
  # ------------------------------------------------------------------
  quality:
    name: Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check all workspaces
        run: pnpm turbo type-check

  # ------------------------------------------------------------------
  # Job 2 — Unit tests (API) with coverage upload
  # ------------------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm --filter @salonin/api test:cov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-coverage
          path: apps/api/coverage/
          retention-days: 14

  # ------------------------------------------------------------------
  # Job 3 — Integration tests (Postgres + Redis services)
  #          Infrastructure ready; integration spec files → Phase 6.2
  # ------------------------------------------------------------------
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_USER: salonin
          POSTGRES_PASSWORD: salonin
          POSTGRES_DB: salonin_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://salonin:salonin@localhost:5432/salonin_test
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Push schema to test database
        run: pnpm exec prisma db push --skip-generate
        env:
          DATABASE_URL: postgresql://salonin:salonin@localhost:5432/salonin_test

      - name: Run integration tests
        run: |
          echo "Integration spec files not yet written — infrastructure verified."
          echo "Add *.integration-spec.ts files and replace this step in Phase 6.2."

  # ------------------------------------------------------------------
  # Job 4 — Build web app (Next.js)
  # ------------------------------------------------------------------
  build-web:
    name: Build Web (Next.js)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js app
        run: pnpm --filter @salonin/web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

  # ------------------------------------------------------------------
  # Job 5 — Build API Docker image (no push — CI verification only)
  # ------------------------------------------------------------------
  build-api-docker:
    name: Build API Docker
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: salonin/api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ------------------------------------------------------------------
  # Job 6 — EAS mobile build (main branch only — requires EAS_TOKEN)
  # ------------------------------------------------------------------
  build-mobile:
    name: Build Mobile (EAS)
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EAS_TOKEN }}

      - name: EAS Build (all platforms)
        run: eas build --platform all --non-interactive --profile production
        working-directory: apps/mobile
        continue-on-error: ${{ secrets.EAS_TOKEN == '' }}
